# Per-project x per-part toolchain/platform mapping for this component.
#
# Two other axes are resolved elsewhere, not here:
#   - project  (which calibration numbers: src/project/<name>/default.yaml) -> superproject conf/<project>.yaml
#   - part     (which kind of deliverable: sil, later production/doc)     -> superproject conf/<project>.yaml
# This file only answers, for a given project+part already chosen upstream,
# which of *this component's own* toolchain presets to build with.
#
# Schema/naming mirrors a proven external reference pattern (a legacy
# automotive supplier's per-component conf/build.yml) - see
# docs/project_variant_model.md for the full model and rationale.
#
# platforms: is read by build.py (superproject dispatcher, plan.md history)
# to resolve which toolchain to build with, and is now passed straight
# through as build.bat's second argument (build.bat <part> <platform>) -
# it drives the actual CMake preset name (<part>-<platform>), not just a
# log line. Platform token = compiler+arch+config as ONE string (matches
# a proven external reference's own convention - see
# docs/project_variant_model.md and the "build names" discussion in
# docs/sw_build_architecture.md): bare name (vs2026) is the default config,
# a trailing _debug suffix (vs2026_debug) is the explicit debug variant.
# There is deliberately no separate build_type field - see build.bat, which
# derives Release/Debug from this same string instead of a third axis.
#
# requires:/tool_requires: below ARE mechanically consumed: conanfile.py's
# requirements()/build_requirements() methods read this file and call
# self.requires()/self.tool_requires() per entry, replacing what used to be
# a hardcoded Python tuple (docs/conan_requires_in_build_yml.md). Nested under
# variants/<project> only - one level up from platforms:, deliberately NOT
# further nested per-part, since which third-party libraries a component
# needs doesn't vary by build kind (sil/gtest/standalone all link the same
# ones) - only platforms: is genuinely part-scoped. build.bat passes
# -o project=<project> (from its own <project> CLI arg) to `conan install`,
# so conanfile.py can resolve the matching branch via its `project` Conan
# option (default base if unset, e.g. a bare `conan install .` - not an
# env var, per plan.md item 14 Bug #16: an env var here would be invisible
# to Conan's package_id, letting base/cus1 builds silently collide once
# they diverge). Today's values are identical
# across base/cus1 - deliberate skeleton-for-scale duplication (same
# reasoning as platforms:'s own per-project copies), not because a real
# difference exists yet. Real per-project version divergence is now just a
# data change, no schema/mechanism change, whenever it's needed - proven by
# temporarily diverging cus1's yaml-cpp version during verification:
# base built clean, cus1 failed on its own (reverted) fake version.
#
# enabled_functions: (plan.md item 16, docs/df_enabled_functions.md) - which
# of src/component/'s per-function subfolders get compiled in, mechanically
# consumed by conanfile.py's configure() (self.options.enabled_functions is
# derived from this list, joined with ";", NOT independently settable via
# -o - same "conf/build.yml is the single source of truth" rule as
# requires: above). Both variants list only "aeb" today because that's the
# only real implementation that exists - acc/lca/lka/ldw under
# src/component/ are still empty .gitkeep placeholders (see
# .claude/workflows/add_function.md), not because base/cus1 are assumed to
# need the same functions forever. Adding a real second function here is a
# two-step change: (1) implement it under src/component/<fn>/ and gate it in
# src/component/CMakeLists.txt (if("<fn>" IN_LIST ENABLED_FUNCTIONS) ...),
# same as add_function.md already documents, (2) list it here per variant.
#
# layout_kind/package_id_extra: plan.md item 10
# (docs/build_conanfile_commonization_plan.md §2) - data read by the common
# scripts/build.py and conanfile.py templates so this component's real build
# shape never becomes a code branch in either shared file. package_kind
# removed entirely (item 10's own follow-up finding, plan.md, 2026-07-20) -
# library vs. application was never read differently anywhere except
# conanfile.py's layout(), which now branches on Conan's own
# self.package_type instead of a redundant second field.
#
# Target keys (sil:/gtest: below, §2.1a, revised 2026-07-20 - a proven
# external reference's own variants: shape, mf_trjpla.yaml, re-checked live
# this session): there is deliberately no separate targets: field listing
# valid target names - every real target is its own explicit key under
# variants.<project>, and build.py discovers valid targets straight from
# those keys. gtest: reuses sil's platforms: list via a YAML anchor/alias
# (&base_platforms / *base_platforms) since both build for the same
# toolchain today - not two independently-maintained copies of the same
# list.

layout_kind: output_folder
package_id_extra: [enabled_functions]

variants:
  base:
    requires:
      - protobuf/3.21.12
      - yaml-cpp/0.8.0
      - adas-interfaces/1.0.0
      - adas-shared-config/1.0.0
    tool_requires:
      - protobuf/3.21.12
    enabled_functions:
      - aeb
    sil:
      platforms: &base_platforms
        - build: vs2026
        # - build: vs2026_debug      # <- illustrative only: no debug preset
        #                            #    exists yet in CMakePresets.json
        # - build: aarch64_qcc_qnx   # <- illustrative only: needs its own
        #                            #    toolchain file + preset first
        #                            #    (plan.md item 8)
    gtest:
      platforms: *base_platforms   # same list, aliased - not re-typed
    # The rest of the frozen target vocabulary (plan.md item 14,
    # docs/build_grammar.md) - listed here commented so every component's file
    # shows the whole vocabulary, uncommented per component as each target
    # gains a real implementation:
    # coverage: { platforms: *base_platforms }        # gtest + OpenCppCoverage/gcov
    # docs:     { platforms: [{ build: noarch }] }    # doxygen; noarch = platform-independent
    # package:  { platforms: *base_platforms }        # conan create (+ --upload)
    # prod:     { platforms: [{ build: aarch64_qcc_qnx }, { build: tda4_ti }] }
  cus1:
    requires:
      - protobuf/3.21.12
      - yaml-cpp/0.8.0
      - adas-interfaces/1.0.0
      - adas-shared-config/1.0.0
    tool_requires:
      - protobuf/3.21.12
    enabled_functions:
      - aeb
    sil:
      platforms: &cus1_platforms
        - build: vs2026
    gtest:
      platforms: *cus1_platforms
