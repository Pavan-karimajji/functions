# Per-project x per-part toolchain/platform mapping for this component.
#
# Two other axes are resolved elsewhere, not here:
#   - project  (which calibration numbers: projects/<name>/default.yaml)   -> superproject conf/<project>.yaml
#   - part     (which kind of deliverable: sil, later production/doc)     -> superproject conf/<project>.yaml
# This file only answers, for a given project+part already chosen upstream,
# which of *this component's own* toolchain presets to build with.
#
# Schema/naming mirrors a proven external reference pattern (a legacy
# automotive supplier's per-component conf/build.yml) - see
# docs/project_variant_model.md for the full model and rationale.
#
# platforms: is read by build.py (superproject dispatcher, plan.md history)
# to resolve which toolchain to build with, and is now passed straight
# through as build.bat's second argument (build.bat <part> <platform>) -
# it drives the actual CMake preset name (<part>-<platform>), not just a
# log line. Platform token = compiler+arch+config as ONE string (matches
# a proven external reference's own convention - see
# docs/project_variant_model.md and the "build names" discussion in
# docs/sw_build_architecture.md): bare name (vs2022) is the default config,
# a trailing _debug suffix (vs2022_debug) is the explicit debug variant.
# There is deliberately no separate build_type field - see build.bat, which
# derives Release/Debug from this same string instead of a third axis.
#
# uses: is documentation only, not yet mechanically consumed by anything -
# adas-interfaces/1.0.0 is hardcoded directly in conanfile.py's requires,
# same as protobuf/yaml-cpp already are, since every project needs the same
# version today (no real per-project divergence to express yet). Wiring
# build.py to read this and override conan install was deliberately skipped
# for this pass - see plan.md's interfaces item for why.

variants:
  base:
    sil:
      platforms:
        - build: vs2022
        # - build: vs2022_debug      # <- illustrative only: no debug preset
        #                            #    exists yet in CMakePresets.json
        # - build: aarch64_qcc_qnx   # <- illustrative only: needs its own
        #                            #    build.bat target + toolchain file
        #                            #    first (plan.md item 7)
      uses:
        adas-interfaces:
          release: 1.0.0
      # production:                  # <- added once plan.md's QNX/Orin/TDA4VM
      #   platforms:                 #    item exists; same file, new part key
      #     - build: aarch64_qcc_qnx
  proj_alpha:
    sil:
      platforms:
        - build: vs2022
      uses:
        adas-interfaces:
          release: 1.0.0
