# Bridge-only scenario config - never read by df (docs/df_carla_bridge_blueprint.md §6).
#
# Canonical AEB test case (docs/df_carla_bridge_blueprint.md §10 "Test
# methodology" - phase 1, test case design): ego 10 m/s, stationary target,
# 30m initial gap. TTC = distance / 10; base project's
# AEB_TTC_PRE_WARNING_THRESHOLD_S=1.0 -> b_latent_pre_warning_active fires
# once distance drops below 10m (closes from 30m in 2.0s, fires at 2.0s,
# reaches the 2m stop distance 0.8s after that - short and deliberate, not
# tuned for watchability like the earlier 60m/5m/s run was).

carla:
  host: 127.0.0.1
  port: 2000
  map: Town04          # long straight highway segments
  # No dt_s here - carla_bridge.py paces itself against real wall-clock time
  # (TARGET_HZ), not a configured nominal step. See carla_bridge.py's
  # TARGET_HZ comment for why CARLA's own tick timestamp isn't used for this.

# Both vehicles are kinematic (physics disabled, teleported by constant velocity
# each tick) - deterministic and reproducible for verifying the pipeline fires at
# the expected TTC. Not modeling real vehicle dynamics; that's a later concern.
# Spawned at a real map spawn point (snapped to the lane centerline), not made-up
# coordinates - arbitrary (x, y) isn't guaranteed to be on the road network.
ego:
  blueprint: vehicle.tesla.model3
  # Verified against this Town04 install: 150m of uninterrupted same-road/lane
  # travel from this spawn point (no dead end, no lane/road id change) - many
  # of Town04's 372 spawn points sit near ramps/merges where waypoint.next()
  # can't continue, which silently froze the scenario before this was picked.
  spawn_point_index: 184
  speed_mps: 10.0

# Spawned initial_gap_m ahead of ego along the same road (waypoint.next()), so
# it automatically faces the same lane direction as ego.
lead:
  blueprint: vehicle.tesla.model3
  initial_gap_m: 30.0
  speed_mps: 0.0

# Range within which other actors are mapped into GenObjectList (blueprint §4 item 3).
object_range_m: 100.0

# GenObjectList ALWAYS has exactly this many GenObjects (user's explicit call,
# 2026-07-09: "at any point functions should get 50 objects") - matches the
# original gen1 reference's fixed-array shape (aObject[EM_N_OBJECTS]), just
# enforced here in the bridge rather than as a C array. Real, in-range
# targets fill the nearest slots first; the rest are default-constructed
# (all-zero) padding, which AebFunction::exec()'s eligibility check already
# ignores (f_dist_x=0 fails dx > 0.0f) - no df/interfaces change needed.
num_object_slots: 50

# df config/DLL paths: leave null to use carla_bridge.py's computed defaults
# (projects/base/default.yaml, build-sil-vs2026's df_sil.dll Release build) -
# override only if you built a different preset/project.
#
# TEMPORARY DEBUG OVERRIDE (2026-07-09): pointed at the Debug build (built
# with full symbols, see docs/df_carla_bridge_blueprint.md) so Visual Studio's
# Attach to Process can hit breakpoints in aeb_function.cpp/df_interface_c.cpp.
# Set back to null for normal (faster, optimized) runs once done debugging.
df:
  config_path: null
  dll_path: "C:\\ws\\repo\\1v-superproject\\modules\\df\\build-sil-vs2026\\src\\platform\\df_sil\\Debug\\df_sil.dll"
