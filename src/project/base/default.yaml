aeb:
  AEB_TTC_BRAKE_THRESHOLD_S: 1.2   # unread placeholder — actuation increment
  # wired: latent pre-warning fires when min CV TTC < this (docs/df_aeb_ttc_blueprint.md)
  AEB_TTC_PRE_WARNING_THRESHOLD_S: 1.0
  AEB_MIN_SPEED_MPS: 1.0
  AEB_MAX_DECELERATION_MPSS: -8.0
  AEB_LATERAL_RELEVANCE_M: 2.0
  AEB_MAX_AGE_OBJECTS_S: 0.2
  AEB_MAX_AGE_EGO_DYN_S: 0.2

acc:
  ACC_DEFAULT_SET_SPEED_MPS: 22.2  # 80 km/h
  ACC_MIN_GAP_TIME_S: 1.5
  ACC_MAX_ACCELERATION_MPSS: 2.0
  ACC_MAX_DECELERATION_MPSS: -3.5

lka:
  LKA_LANE_CENTER_DEADBAND_M: 0.15
  LKA_MAX_STEERING_TORQUE_NM: 3.0
  LKA_MIN_SPEED_MPS: 16.7  # 60 km/h

# lca/ldw: pre-staged calibration placeholders — function code not yet compiled in
# (not in conf/build.yml enabled_functions). Inert until the function lands;
# ParamLoader only reads sections the compiled code asks for. See
# docs/df_enabled_functions.md §6 boundary rule 3.
lca:
  LCA_MIN_SPEED_MPS: 8.0
  LCA_REAR_ZONE_LENGTH_M: 50.0
  LCA_MAX_AGE_OBJECTS_S: 0.2

ldw:
  LDW_MIN_SPEED_MPS: 16.7  # 60 km/h
  LDW_DEPARTURE_WARNING_M: 0.3  # lateral distance to lane marking
  LDW_MAX_AGE_LANE_S: 0.2
